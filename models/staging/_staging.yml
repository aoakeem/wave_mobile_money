version: 2

models:
  - name: stg_payments
    description: >
      Cleaned payments source. View over the raw payments table - one row per payment
      reflecting current status. Heavy uniqueness and integrity tests live on fct_payments
      (scoped by updated_at) to avoid full billion-row source scans on every test run.
    columns:
      - name: payment_id
        description: Unique payment identifier.
        tests:
          - unique:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: wallet_id
        description: Wallet that initiated the payment.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: merchant_id
        description: Merchant receiving the payment. Null for P2P transfers.
        tests:
          - relationships:
              to: ref('stg_merchants')
              field: merchant_id
              config:
                where: "merchant_id is not null and updated_at::date >= dateadd(day, -1, current_date)"
      - name: amount
        description: Payment amount in local currency. Always positive.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: currency
        description: ISO 4217 currency code.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: status
        description: Current payment status.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
          - accepted_values:
              values: ["success", "failed", "reversed"]
      - name: created_at
        description: Immutable timestamp when the payment was created.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: updated_at
        description: Timestamp of the most recent status change.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: country
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
      - name: channel
        description: Payment channel.
        tests:
          - not_null:
              config:
                where: "updated_at::date >= dateadd(day, -1, current_date)"
          - accepted_values:
              values: ["ussd", "app", "agent"]

  - name: stg_merchants
    description: Cleaned merchants reference table. View - small enough to scan on every query.
    columns:
      - name: merchant_id
        description: Unique merchant identifier.
        tests:
          - unique
          - not_null
      - name: merchant_name
        description: Display name of the merchant.
        tests:
          - not_null
      - name: category
        description: Merchant category.
        tests:
          - accepted_values:
              values: ["supermarket", "ecommerce", "taxi", "utility", "other"]
      - name: country
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: status
        description: Merchant account status.
        tests:
          - not_null
          - accepted_values:
              values: ["active", "inactive", "suspended"]

  - name: stg_wallets
    description: >
      Cleaned wallets reference table. View - reflects current wallet state.
      kyc_tier is the current tier; it only increases and is overwritten in place.
    columns:
      - name: wallet_id
        description: Unique wallet identifier.
        tests:
          - unique
          - not_null
      - name: kyc_tier
        description: Current KYC tier. Tiers can only increase over time.
        tests:
          - accepted_values:
              values: [0, 1, 2]
      - name: country
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: is_agent
        description: True if this wallet belongs to a Wave agent.
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: status
        description: Wallet status.
        tests:
          - not_null
          - accepted_values:
              values: ["active", "inactive", "blocked"]
      - name: updated_at
        description: Timestamp of the last kyc_tier update.
        tests:
          - not_null
