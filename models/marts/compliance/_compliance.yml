version: 2

models:
  - name: mart_compliance_current
    description: >
      Current list of wallets breaching their KYC monthly transaction limit.
      Fully replaced on every 15-minute run. One row per breaching wallet.

      A wallet appears here when its sum of successful payment amounts for the current
      calendar month (converted to USD) exceeds the limit for its kyc_tier:
        - Tier 0: USD 100/month
        - Tier 1: USD 1,000/month
        - Tier 2: USD 10,000/month

      Assumptions:
        - Only status = 'success' transactions count toward monthly volume.
          Reversed transactions are excluded (the transaction was unwound).
        - kyc_tier is the wallet's current tier. Since tiers only increase,
          this gives the most favourable (highest) limit interpretation.
        - Exchange rates use the latest available rate on or before the payment date
          to handle days where a rate may not yet be loaded.
    columns:
      - name: wallet_id
        description: Breaching wallet identifier.
        tests:
          - unique
          - not_null
      - name: country
        description: Wallet country.
        tests:
          - not_null
      - name: kyc_tier
        description: Current KYC tier used to determine the monthly limit.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2]
      - name: is_agent
        description: True if this wallet belongs to a Wave agent.
        tests:
          - not_null
      - name: monthly_volume_usd
        description: Total USD-equivalent successful transaction volume this calendar month.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: monthly_limit_usd
        description: Monthly transaction limit in USD for this wallet's kyc_tier.
        tests:
          - not_null
      - name: breach_amount_usd
        description: Amount by which the wallet exceeds its limit (monthly_volume_usd - monthly_limit_usd).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: payment_count
        description: Number of successful payments contributing to the monthly volume.
        tests:
          - not_null
      - name: last_payment_at
        description: Timestamp of the most recent successful payment this month.
        tests:
          - not_null
      - name: checked_at
        description: Timestamp when this compliance check was run.
        tests:
          - not_null

  - name: mart_compliance_current_transactions
    description: >
      Transaction-level detail for all payments contributing to current-month breaches.
      One row per payment per breaching wallet. Fully replaced on every 15-minute run.
      Join to mart_compliance_current on wallet_id for the wallet-level breach summary.
    columns:
      - name: payment_id
        description: Unique payment identifier.
        tests:
          - unique
          - not_null
      - name: wallet_id
        description: Wallet that made this payment. Guaranteed to appear in mart_compliance_current.
        tests:
          - not_null
          - relationships:
              to: ref('mart_compliance_current')
              field: wallet_id
      - name: amount
        description: Payment amount in local currency.
        tests:
          - not_null
      - name: currency
        description: ISO 4217 currency code.
        tests:
          - not_null
      - name: amount_usd
        description: >
          Payment amount converted to USD using the exchange rate on or before payment date.
          Not null - a null value indicates a missing exchange rate and will fail this test.
        tests:
          - not_null
      - name: created_at
        description: Timestamp when the payment was created.
        tests:
          - not_null
      - name: country
        description: ISO 3166-1 alpha-2 country code.
        tests:
          - not_null
      - name: channel
        description: Payment channel.
        tests:
          - not_null
          - accepted_values:
              values: ["ussd", "app", "agent"]
      - name: merchant_id
        description: Merchant identifier. Null for P2P transfers.
      - name: merchant_category
        description: Merchant category. 'none' for P2P transfers.
        tests:
          - not_null
      - name: kyc_tier
        description: KYC tier of the transacting wallet.
      - name: checked_at
        description: Timestamp when this compliance check was run.
        tests:
          - not_null

  - name: mart_compliance_history
    description: >
      Append-only historical log of all compliance checks. Each 15-minute run appends
      the full contents of mart_compliance_current with the run's checked_at timestamp.
      Supports trend analysis: e.g. "how many wallets were breaching on any given day?",
      "which wallets have been persistently non-compliant?".

      Clustered on checked_at for efficient time-range queries.
    columns:
      - name: wallet_id
        description: Breaching wallet identifier at the time of this check.
        tests:
          - not_null
      - name: country
        description: Wallet country.
        tests:
          - not_null
      - name: kyc_tier
        description: KYC tier at the time of this check.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2]
      - name: is_agent
        description: True if this wallet belongs to a Wave agent.
        tests:
          - not_null
      - name: monthly_volume_usd
        description: Monthly USD volume at the time of this check.
        tests:
          - not_null
      - name: monthly_limit_usd
        description: Monthly limit that applied at the time of this check.
        tests:
          - not_null
      - name: breach_amount_usd
        description: Breach amount (monthly_volume_usd - monthly_limit_usd) at the time of this check.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: payment_count
        description: Number of payments contributing to the volume at the time of this check.
        tests:
          - not_null
      - name: checked_at
        description: Timestamp of the compliance check run that produced this record.
        tests:
          - not_null
